services:
  # ===========================================
  # PostgreSQL - Database (dev, internal only)
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: monexup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-monexup_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-monexup_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emagine-network

  # ===========================================
  # MonexUp API - Main application API
  # ===========================================
  monexup-api:
    build:
      context: .
      dockerfile: MonexUp.API/Dockerfile.dev
    container_name: monexup-api
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__MonexUpContext: "Host=postgres;Port=5432;Database=${DB_NAME:-monexup_db};Username=${DB_USER};Password=${DB_PASSWORD}"
      # zTools
      zTools__ApiURL: ${ZTOOLS_API_URL}
      # NAuth
      NAuth__ApiUrl: ${NAUTH_API_URL}
      NAuth__JwtSecret: ${NAUTH_JWT_SECRET}
      NAuth__BucketName: ${NAUTH_BUCKET:-monexup}
      # ProxyPay
      ProxyPay__ApiUrl: ${PROXYPAY_API_URL:-http://localhost:5100}
      ProxyPay__ClientId: ${PROXYPAY_CLIENT_ID}
      ProxyPay__TenantId: ${PROXYPAY_TENANT_ID:-monexup}
      # Lofn
      Lofn__ApiURL: ${LOFN_API_URL:-http://localhost:5003}
      # Logging — surface Information + Error to container stdout
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft: Warning
      Logging__LogLevel__Microsoft.Hosting.Lifetime: Information
      Logging__LogLevel__Microsoft.EntityFrameworkCore: Information
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: Information
      DOTNET_CONSOLE_ANSI_COLOR: 0
    ports:
      - "5000:80"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - emagine-network

  # ===========================================
  # MonexUp BackgroundService
  # ===========================================
  # monexup-bg:
  #   build:
  #     context: .
  #     dockerfile: MonexUp.BackgroundService/Dockerfile
  #   container_name: monexup-bg
  #   env_file: .env
  #   environment:
  #     ASPNETCORE_ENVIRONMENT: Docker
  #     ConnectionStrings__MonexUpContext: "Host=postgres;Port=5432;Database=${DB_NAME:-monexup_db};Username=${DB_USER};Password=${DB_PASSWORD}"
  #     ZTOOLS_API_URL: ${ZTOOLS_API_URL}
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - emagine-network

volumes:
  postgres_data:
    driver: local

networks:
  emagine-network:
    external: true
