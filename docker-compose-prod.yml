services:
  # ===========================================
  # PostgreSQL - Database (internal only)
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: monexup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-monexup_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monexup-network

  # ===========================================
  # NAuth API - Authentication service
  # ===========================================
  nauth-api:
    build:
      context: ./submodules/NAuth
      dockerfile: Dockerfile
    container_name: nauth-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__NAuthContext: "Host=postgres;Port=5432;Database=${NAUTH_DB_NAME:-nauth_db};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      zTools__ApiURL: http://ztools-api:8080
      NAuth__JwtSecret: ${NAUTH_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monexup-network

  # ===========================================
  # zTools API - Utility microservice
  # ===========================================
  ztools-api:
    build:
      context: ./submodules/zTools
      dockerfile: Dockerfile
    container_name: ztools-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      MAILERSEND__APIURL: ${MAILERSEND_API_URL:-https://api.mailersend.com/v1/email}
      MAILERSEND__MAILSENDER: ${MAILERSEND_SENDER}
      MAILERSEND__APITOKEN: ${MAILERSEND_API_TOKEN}
      CHATGPT_APIURL: ${CHATGPT_APIURL:-https://api.openai.com/v1/chat/completions}
      CHATGPT_IMAGEAPIURL: ${CHATGPT_IMAGEAPIURL:-https://api.openai.com/v1/images/generations}
      CHATGPT_APIKEY: ${CHATGPT_APIKEY}
      CHATGPT_MODEL: ${CHATGPT_MODEL:-gpt-3.5-turbo}
      S3__ACCESSKEY: ${S3_ACCESS_KEY}
      S3__SECRETKEY: ${S3_SECRET_KEY}
      S3__ENDPOINT: ${S3_ENDPOINT}
    networks:
      - monexup-network

  # ===========================================
  # MonexUp API - Main application API
  # ===========================================
  monexup-api:
    build:
      context: .
      dockerfile: MonexUp.API/Dockerfile
    container_name: monexup-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MonexUpContext: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-monexup_db};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      zTools__ApiURL: http://ztools-api:8080
      NAuth__ApiUrl: http://nauth-api:80
      NAuth__JwtSecret: ${NAUTH_JWT_SECRET}
      NAuth__BucketName: ${S3_BUCKET:-monexup}
      ProxyPay__ApiUrl: ${PROXYPAY_API_URL}
      ProxyPay__ClientId: ${PROXYPAY_CLIENT_ID}
      ProxyPay__TenantId: ${PROXYPAY_TENANT_ID:-monexup}
      Lofn__ApiURL: ${LOFN_API_URL}
    depends_on:
      postgres:
        condition: service_healthy
      nauth-api:
        condition: service_started
      ztools-api:
        condition: service_started
    networks:
      - monexup-network

  # ===========================================
  # MonexUp BackgroundService
  # ===========================================
  monexup-bg:
    build:
      context: .
      dockerfile: MonexUp.BackgroundService/Dockerfile
    container_name: monexup-bg
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MonexUpContext: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-monexup_db};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ZTOOLS_API_URL: http://ztools-api:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monexup-network

  # ===========================================
  # MonexUp Frontend - React app
  # ===========================================
  monexup-app:
    build:
      context: ./monexup-app
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_NAUTH_API_URL: ${REACT_APP_NAUTH_API_URL}
        REACT_APP_PROXYPAY_API_URL: ${REACT_APP_PROXYPAY_API_URL}
        REACT_APP_PROXYPAY_CLIENT_ID: ${REACT_APP_PROXYPAY_CLIENT_ID}
        REACT_APP_PROXYPAY_TENANT_ID: ${REACT_APP_PROXYPAY_TENANT_ID:-monexup}
        REACT_APP_LOFN_API_URL: ${REACT_APP_LOFN_API_URL}
        REACT_APP_DEDALO_API_URL: ${REACT_APP_DEDALO_API_URL}
        REACT_APP_PRODUCTION: "1"
        REACT_APP_SITE_BASENAME: /
        REACT_APP_PROJECT_NAME: MonexUp.com
    container_name: monexup-app
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - monexup-network

volumes:
  postgres_data:
    driver: local

networks:
  monexup-network:
    driver: bridge
